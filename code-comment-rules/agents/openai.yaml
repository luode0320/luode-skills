interface:
  display_name: "代码注释"
  short_description: "检查改动位点注释补齐，强制方法注释顺序与步骤注释完整性"
  default_prompt: "使用 $code-comment-rules 检查本轮改动位点注释是否补齐：1) 多步骤代码是否就近补齐中文 `1.` `2.` `3.` 注释；2) 若方法体已存在多个流程型普通注释（如“查询订单”“分批处理”“更新状态”），是否已改写为编号步骤注释；3) 类/结构体字段在定义、初始化和使用处是否有重复注释；4) 每个新增或修改的函数/方法是否补齐 `[参数]` / `[返回]` 与最近修改时间（北京时间：yyyy-MM-DD HH:mm:ss）；5) 最近修改时间行是否追加本次改动原因简述（例如：`// 最近修改时间: 2026-04-02 17:30:14 将查询1小时改成10小时`）；6) 函数/方法注释顺序是否为“`[参数]` -> `[返回]` -> `最近修改时间`”，且最近修改时间必须最后一行；7) 用户即使只要求“补充注释”，也必须继续检查方法体 `1/2/3` 步骤注释；8) 任一缺失都判定为未通过，不得给出可提交结论。"
