version: 1

roots:
  requirement_docs: "ment"
  bug_records: "bug"
  test_assets: "test"
  project_docs: "doc"

entry_files:
  requirement_doc: "{datetime}_{requirement_cn_title}.md"
  requirement_flow_svg: "{datetime}_{requirement_cn_title}.flow.svg"
  requirement_sequence_svg: "{datetime}_{requirement_cn_title}.sequence.svg"
  requirement_doc_note: "需求文档命名必须使用 yyyy-MM-DD_HHmmss_中文简介标题.md；中文简介标题为动态主题，禁止使用固定字面量“需求中文说明”"
  acceptance_doc: "{date}_验收中文说明.md"
  implementation_plan_doc: "{requirement_doc_stem}实施计划.md"
  implementation_plan_doc_note: "实施计划命名必须复用对应需求文档同前缀（yyyy-MM-DD_HHmmss_中文简介标题），并在末尾追加“实施计划”；例如：2026-04-16_141518_多业务复用Swap适配控制需求实施计划.md"
  bug_root_readme: "README.md"
  bug_flow_svg: "flow.svg"
  bug_sequence_svg: "sequence.svg"
  test_task_readme: "README.md"
  project_design_doc: "项目设计.md"

root_files:
  project_design_primary: "项目设计.md"
  project_design_aliases:
    - "架构设计.md"
    - "项目大纲.md"
    - "系统设计.md"
    - "项目说明.md"

directories:
  bug_root: "{datetime}_问题中文简介"
  test_task_root: "{datetime}"
  test_task_doc_dir: "{test_task_cn_title}"
  test_task_doc_dir_note: "根据 README 将要描述的测试任务主题动态命名；禁止使用字面量“测试任务中文简介”"

bootstrap:
  recent_context_scan_roots:
    - "ment"
    - "test"
    - "bug"
    - "doc"
  weak_reference_root_files:
    - "项目设计.md"
    - "架构设计.md"
    - "项目大纲.md"
    - "系统设计.md"
    - "项目说明.md"

policies:
  same_requirement_updates_same_doc: true
  same_requirement_acceptance_updates_same_doc: true
  same_requirement_plan_updates_same_doc: true
  requirement_requires_svg_diagrams: true
  same_bug_updates_same_root: true
  bug_requires_svg_diagrams: true
  same_test_round_updates_same_root: true
  new_independent_test_round_creates_new_root: true
  same_project_design_updates_same_doc: true
  project_design_doc_is_weak_reference: true
  missing_project_design_doc_can_be_created_after_full_analysis: true
