version: 4
roots:
  architecture_docs: "doc/1-架构"
  requirement_docs: "doc/2-需求"
  requirement_assets: "doc/2-需求/data"
  implementation_docs: "doc/3-实施"
  bug_records: "doc/4-bugs"
  test_assets: "doc/5-tests"
  review_records: "doc/6-审查"
  acceptance_docs: "doc/7-验收"
  project_docs: "doc"
  project_local_skills: "skill"
entry_files:
  architecture_overview_doc: "1-总架构.md"
  architecture_directory_tree_doc: "2-目录树.md"
  architecture_module_responsibilities_doc: "3-模块职责.md"
  architecture_business_flow_index_doc: "4-主要业务链路.md"
  architecture_business_flow_doc: "{business_flow_sequence}-业务链路-{business_flow_cn_title}.md"
  architecture_appendix_doc: "附录-{architecture_cn_title}.md"
  architecture_core_docs_note: "doc/1-架构/ 的四个稳定中文主入口固定为 1-总架构.md、2-目录树.md、3-模块职责.md、4-主要业务链路.md"
  architecture_business_flow_doc_note: "业务链路从序号 5 开始；同一链路持续更新原编号文档，新增独立链路使用当前最大业务链路编号加 1，并同步更新 4-主要业务链路.md 索引；历史编号不复用、不重排"
  requirement_doc: "{datetime}_{requirement_cn_title}.md"
  requirement_gap_doc: "{requirement_doc_stem}.gap.md"
  requirement_flow_svg: "{datetime}_{requirement_cn_title}.flow.svg"
  requirement_sequence_svg: "{datetime}_{requirement_cn_title}.sequence.svg"
  requirement_asset_image: "{requirement_doc_stem}.{asset_slug}.{ext}"
  requirement_doc_note: "需求文档命名必须使用 yyyy-MM-DD_HHmmss_中文简介标题.md；中文简介标题为动态主题，禁止使用固定字面量“需求中文说明”"
  requirement_asset_image_note: "需求截图与外部图片素材统一放在 doc/2-需求/data/；文件名建议复用需求文档主干并追加 ASCII 素材标识，例如 2026-05-25_103000_支付路由改造.req-shot-login.png"
  requirement_gap_doc_note: "临时缺口文档必须复用对应需求文档同前缀，并在末尾追加“.gap.md”；例如：2026-04-16_141518_多业务复用Swap适配控制需求.gap.md。该文档仅在 gap 未关闭时存在，用户确认并回填主需求文档后必须删除。"
  acceptance_criteria_doc: "{requirement_doc_stem}验收标准.md"
  acceptance_criteria_doc_note: "前置验收标准文档必须复用对应需求文档同前缀，并在末尾追加“验收标准”；例如：2026-04-16_141518_多业务复用Swap适配控制需求验收标准.md"
  final_acceptance_doc: "{requirement_doc_stem}最终验收.md"
  final_acceptance_doc_note: "最终验收文档必须复用对应需求文档同前缀，并在末尾追加“最终验收”；例如：2026-04-16_141518_多业务复用Swap适配控制需求最终验收.md"
  implementation_overview_doc: "{requirement_doc_stem}实施总览.md"
  implementation_overview_doc_note: "实施总览文档必须复用对应需求文档同前缀，并在末尾追加“实施总览”；例如：2026-04-16_141518_多业务复用Swap适配控制需求实施总览.md"
  implementation_cycle_doc: "{requirement_doc_stem}实施周期{cycle_no}_{cycle_cn_title}.md"
  implementation_cycle_doc_note: "实施周期文档必须复用对应需求文档同前缀，并在末尾追加“实施周期NN_中文主题”；例如：2026-04-16_141518_多业务复用Swap适配控制需求实施周期01_接口与配置落点.md"
  bug_root_readme: "README.md"
  bug_flow_svg: "flow.svg"
  bug_sequence_svg: "sequence.svg"
  test_task_readme: "README.md"
  review_doc: "{date}_{review_cn_title}.md"
  review_index_readme: "README.md"
  project_design_doc: "项目设计.md"
root_files:
  project_design_primary: "项目设计.md"
  project_design_aliases:
    - "架构设计.md"
    - "项目大纲.md"
    - "系统设计.md"
    - "项目说明.md"
directories:
  bug_root: "{datetime}_问题中文简介"
  test_task_root: "{datetime}"
  test_task_doc_dir: "{test_task_cn_title}"
  test_task_doc_dir_note: "根据 README 将要描述的测试任务主题动态命名；禁止使用字面量“测试任务中文简介”"
bootstrap:
  recent_context_scan_roots:
    - "doc/1-架构"
    - "doc/2-需求"
    - "doc/3-实施"
    - "doc/4-bugs"
    - "doc/5-tests"
    - "doc/6-审查"
    - "doc/7-验收"
    - "doc"
    - "skill"
  weak_reference_root_files:
    - "项目设计.md"
    - "架构设计.md"
    - "项目大纲.md"
    - "系统设计.md"
    - "项目说明.md"
policies:
  architecture_core_docs_use_stable_ordered_chinese_names: true
  same_architecture_topic_updates_same_doc: true
  same_business_flow_updates_same_doc: true
  new_business_flow_creates_new_doc: true
  architecture_business_flow_index_required: true
  architecture_business_flow_sequence_starts_at_five: true
  architecture_business_flow_sequence_is_append_only: true
  same_requirement_updates_same_doc: true
  requirement_gap_doc_is_temporary: true
  same_requirement_acceptance_updates_same_doc: true
  same_requirement_plan_updates_same_doc: true
  implementation_plan_separated_from_requirement_domain: true
  implementation_cycle_docs_allowed: true
  final_acceptance_requires_test_and_review: true
  requirement_requires_svg_diagrams: true
  requirement_assets_under_doc_requirement_data: true
  requirement_doc_embeds_assets_in_markdown: true
  same_bug_updates_same_root: true
  bug_requires_svg_diagrams: true
  same_test_round_updates_same_root: true
  new_independent_test_round_creates_new_root: true
  review_outputs_under_doc_review_root: true
  same_project_design_updates_same_doc: true
  project_design_doc_is_weak_reference: true
  missing_project_design_doc_can_be_created_after_full_analysis: true
