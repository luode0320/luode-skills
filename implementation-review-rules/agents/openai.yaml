interface:
  display_name: "实现自审规则"
  short_description: "编码完成后对可读性、结构、命名、依赖、错误处理、日志和注释 Owner 状态做第一道自审"
  default_prompt: "使用 $implementation-review-rules 在进入测试前检查当前实现是否符合可读性优先、单一职责、常量抽离、依赖治理、命名语义化、错误处理和日志可追溯要求；存在代码改动时必须读取 `comment-placement-granularity-rules` 与 `comment-completion-gate-rules`，只消费其 PASS/FAIL、缺口和证据，不复制注释详细字段。Go 场景下还需确认 `internal/service` 没有散落请求/响应/第三方结果结构体并归位到 `internal/entity/<domain>/`，函数内局部变量未使用 `var (...)` 分组声明，多参数函数签名未直接使用多行参数列表，且第三方 API 响应未长期使用 map + key 硬编码解析。若 P0/P1 导致真实阻断，在审查文档按 task-blocker-closure-contract 创建或引用去重的 `BLK-*`，写明回改计划和复审入口；不得将 P2/P3、limited 或 not_applicable 误报为阻断。"
