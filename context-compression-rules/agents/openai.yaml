interface:
  display_name: "上下文压缩"
  short_description: "压缩后恢复规则与当前状态，仅在缺近期事实时条件预热"
  default_prompt: "使用 $context-compression-rules 按共享 context-recovery-contract 重载当前平台规则文件与项目当前上下文，恢复目标、范围、验证、下一执行点和编码许可；PROJECT_CURRENT 存在任务投影时先调用 $task-plan-rehydration-rules，真实 update_plan 后记录 task_projection，进行中步骤先核验；再判定 recent_context_state，只有明确为 missing 时才联动 $recent-context-bootstrap-rules。"
