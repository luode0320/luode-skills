interface:
  display_name: "需求接入"
  short_description: "接收资料或进入 initial-discovery 路由，收口为同一份需求主文档。"
  default_prompt: "使用 $requirement-intake-rules；遇到粗略 idea 或可主动查证的资料缺口先进入 initial-discovery 路由，再根据侦察结果、需求 URL 和零散资料整理需求，按极致完整性标准冻结 SRC/DEC、REQ/RULE、输入/处理/输出、异常、权限、兼容、观测、回滚、unresolved_decisions、N/A 原因证据、Mermaid 图形和 REQ/RULE-AC-TEST-EVIDENCE 双向追踪；P0/P1 未决即 blocked，P2 必须有默认授权/有效期/复核；更新 doc/2-需求/ 同一份主文档，交给普通模型时不得自行补决策。"
