interface:
  display_name: "需求接入"
  short_description: "新需求接入唯一入口，含 initial-discovery 与 gap-routing。"
  default_prompt: "使用 $requirement-intake-rules 作为新需求接入唯一自动触发入口和唯一需求主文档 Owner；粗略 idea 或可主动查证资料先走 initial-discovery，侦察后仍有方向级关键缺口才走 gap-routing，并保留一次一个真实问题、禁止猜测、local、授权、暂停、停止和回滚规则。范围、兼容或旧逻辑归属交 requirement-boundary-rules，多模块或多独立子系统交 requirement-splitting-rules，已确认需求的新增条件或默认值变化交 requirement-change-rules；专项 Skill 继续自动触发。"
