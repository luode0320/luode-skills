interface:
  display_name: "会话标题规则"
  short_description: "在支持改名的环境中根据用户提问或当前任务主题更新会话标题"
  default_prompt: "Use $thread-title-rules to keep this thread title aligned with the current task. In Codex, if `set_thread_title` or `list_threads` are not already exposed, first discover the thread tools via tool search, then resolve the current thread and rename it. When the user asks a clear question, extract a stable Chinese task topic from the question and rename only if it is specific enough to summarize. Only skip when the title is already accurate, the question or task is too vague to stabilize, or the real tools remain unavailable after discovery."
policy:
  allow_implicit_invocation: true
