interface:
  display_name: "会话标题规则"
  short_description: "在支持改名的环境中根据用户提问或当前任务主题更新会话标题"
  default_prompt: "Use $thread-title-rules to keep this thread title aligned with the current task throughout the conversation, not only at final summary time. In Codex, if `set_thread_title` or `list_threads` are not already exposed, first discover the thread tools via tool search, then resolve the current thread and rename it. When the user asks a clear question, or when a goal is created/resumed, context is resumed after compression, or a long-running task enters a stable new phase, extract a stable Chinese task topic and rename only if the title is specific enough and not already accurate. Skip small internal step changes, vague topics, explicit user opt-out, or unavailable real tools."
policy:
  allow_implicit_invocation: true
