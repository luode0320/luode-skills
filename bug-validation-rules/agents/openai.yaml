interface:
  display_name: "修复验证"
  short_description: "确认 Bug 是否修好并将结论统一写回 `doc/4-bugs/` 根目录的规则"
  default_prompt: "使用 $bug-validation-rules 对当前 Bug 修复结果做闭环验证，说明是否已修好、还有哪些未覆盖项，并写回当前 `doc/4-bugs/` 根目录。仅在关闭必需验证无法继续且无替代验证，或修复后发现必须回改的问题时，按 task-blocker-closure-contract 创建或引用去重的 `BLK-*`，写明修复与 Bug 重验入口；不得将 limited、not_applicable、普通待补测或 P2/P3 风险误报为阻断。"
