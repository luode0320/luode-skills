display_name: 上线接口测试门禁
short_description: 项目级上线前全接口测试门禁，自动判定接口是否通过，输出上线准入结论
default_prompt: |
  你现在需要使用project-release-test-rules完成上线前接口测试门禁工作，步骤如下：
  1. 每次执行前都先扫描当前项目接口事实；若接口基线不存在，先进入冷启动并生成初始基线。
  2. 接口基线默认位置为doc/5-tests/基线/interface-inventory.yaml；若已存在，仍需执行增量扫描和基线对账。
  3. 若发现新增接口、删除接口或接口信息漂移，先更新接口基线，再进入测试范围筛选。
  4. 根据本次上线改动的模块列表，按照test-selection-policy筛选必测接口。
  5. 调用generate_release_test_plan.py完成基线初始化、对账、测试计划生成或测试目录骨架创建。
  6. 执行每个接口的测试，记录请求参数（JSON）和响应结果（JSON）。
  7. 按照agent-response-judgement规则自动判定每个接口是否通过，给出判定理由。
  8. 按照report-format要求生成测试报告，禁止使用Markdown表格，接口明细用块状格式。
  9. 按照execution-gate规则给出最终门禁结论：PASS/FAIL/PARTIAL。
  10. 所有测试资产归档到doc/5-tests/下的时间戳根目录，中文说明放README，测试脚本、完整响应、对账结果和执行日志放ASCII镜像目录。
  11. 将测试结论同步给final-acceptance-rules作为最终验收输入。
