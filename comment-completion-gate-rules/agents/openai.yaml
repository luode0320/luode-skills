interface:
  display_name: "注释补齐闸门"
  short_description: "检查改动位点的函数头元信息、步骤编号和补注释完成度"
  default_prompt: "使用 $comment-completion-gate-rules 检查本轮改动位点注释是否补齐：1) 补注释是否优先覆盖 `git` 未提交改动；2) 每个新增或修改的函数/方法是否补齐 `[参数]` / `[返回]` / `最近修改时间`，且顺序固定、最后一行为最近修改时间；3) 最近修改时间是否包含本次改动原因简述；4) 方法体存在步骤流程时，是否已就近补齐至少 `1.`，若存在多个连续步骤是否补齐 `1.` `2.` `3.`，并在必要时使用 `1.1` `1.2` 细分；5) 流程型普通注释是否已改写为编号步骤注释；6) 任一缺失都直接判定未通过。"
