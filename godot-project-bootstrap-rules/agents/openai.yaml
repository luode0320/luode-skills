interface:
  display_name: "Godot 项目自举"
  short_description: "自动补齐 Godot 项目的 AGENTS 模板、Godot CLI 工具约定与图像生成入口约定"
  default_prompt: "使用 $godot-project-bootstrap-rules 检查当前仓库是否为 Godot 项目；若命中，则联动 project-agents-bootstrap、mcp-installation-rules 与 imagegen，把项目级 AGENTS.md 中的 Godot 工具配置与图像生成配置模板补齐，并明确后续默认通过本地 `godot4` / `godot` 或项目自带启动脚本接管。AGENTS.md 只能写读取约定、baseurl、模型名、优先级和回退规则，不能写真实 OPENAI_API_KEY。"
