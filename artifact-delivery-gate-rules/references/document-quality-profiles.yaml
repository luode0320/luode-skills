version: 1
placeholder_terms:
  - TBD
  - TODO
  - 待补
  - 后续再补
  - 实现时再看
  - 相关逻辑
  - 适当处理
  - 尽量
  - 合理
  - 正常
profiles:
  requirement:
    required_sections:
      - 文档信息
      - 当前计划最终方案简要说明
      - 需求来源与证据台账
      - 目标与非目标
      - 功能需求
      - 业务规则与优先级
      - 数据与外部契约
      - 风险、假设、依赖与阻断
      - 追踪矩阵
    id_prefixes: [SRC, DEC, REQ, RULE, BOUND, GAP, SLICE, AC]
    diagrams: {flowchart: 1, sequenceDiagram: 1}
  acceptance:
    required_sections:
      - 场景与前置条件
      - 输入与预期结果
      - 异常与边界条件
      - 范围外说明
      - REQ-AC 追踪矩阵
    id_prefixes: [AC, REQ, RULE]
    diagrams: {flowchart: 1}
  implementation_overview:
    required_sections:
      - 当前计划最终方案简要说明
      - Agent 对当前问题的理解
      - 实施周期总览
      - 阶段计划
      - 最小任务清单
      - 现状与落点
      - 真实测试安排
      - 风险与阻断项
      - 任务完成、停止与最大推进边界
      - 追踪矩阵
    id_prefixes: [SRC, DEC, REQ, AC, CYCLE, TASK, TEST, ROLLBACK]
    diagrams: {flowchart: 2}
  implementation_cycle:
    required_sections:
      - 当前周期目标
      - 进入条件与收口条件
      - 当前代码基线
      - 周期内最小任务执行顺序
      - 文件与符号操作契约
      - 真实测试与断言
      - 回滚与停止条件
      - 周期追踪矩阵
    id_prefixes: [CYCLE, TASK, TEST, ROLLBACK, AC]
    diagrams: {flowchart: 1}
