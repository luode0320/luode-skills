version: 1
scope: new_or_modified_managed_document_generation_entries
template_count: 24
summary_opening:
  placement: after_h1_before_first_h2
  paragraph_count: 1
  required_labels: [结论, 影响, 范围, 非范围, 变化, 完成标准, 术语说明, 验证状态]
  terminology_rule: first_technical_term_requires_business_chinese_explanation_or_no_term_declaration
  forbidden_content: [stable_id, command, log, sql, api_payload, file_line, traceability_matrix, code_fence]
terminal_appendix_group:
  required_order: [执行附录, 追踪附录]
  execution_appendix: [environment, steps, commands, samples, logs, sql, api_payload]
  tracking_appendix: [stable_ids, sources, evidence, traceability_matrix, machine_locations]
  placement: after_all_business_body_sections
  contiguity: required
  legacy_policy: preserve_existing_equivalent_appendix_name_and_responsibility
