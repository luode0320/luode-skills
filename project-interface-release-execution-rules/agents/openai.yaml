display_name: 上线接口测试执行与放行
short_description: 依赖接口基线执行上线前全接口测试，自动判定接口是否通过，输出上线放行结论
default_prompt: |
  你现在需要使用project-interface-release-execution-rules完成上线前接口测试执行工作，步骤如下：
  1. 先确认project-interface-baseline-rules是否已提供最新接口基线；基线过期或不存在时先转交对方刷新，不自行扫描。
  2. 根据本次上线改动的模块列表，按照test-selection-policy筛选必测接口。
  3. 调用generate_release_test_plan.py（委派release_test_engine.cli）完成测试计划生成或测试目录骨架创建。
  4. 执行每个接口的测试，记录请求参数（JSON）和响应结果（JSON）。
  5. 按照agent-response-judgement规则自动判定每个接口是否通过，给出判定理由。
  6. 按照report-format要求生成测试报告，禁止使用Markdown表格，接口明细用块状格式。
  7. 按照execution-gate规则给出最终门禁结论：PASS/FAIL/PARTIAL。
  8. 所有测试资产归档到doc/5-tests/下的时间戳根目录，中文说明放README，测试脚本、完整响应、对账结果和执行日志放ASCII镜像目录。
  9. 将测试结论、新发现的可复用参数和历史摘要回写project-interface-baseline-rules维护的基线资产。
  10. 将本次测试结论同步给final-acceptance-rules作为最终验收输入。