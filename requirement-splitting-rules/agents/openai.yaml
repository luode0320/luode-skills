interface:
  display_name: "需求拆分"
  short_description: "将大需求拆分，并更新同一份 doc/2-需求/ 主文档。"
  default_prompt: "使用 $requirement-splitting-rules 为每个垂直切片生成唯一 SLICE-*，冻结 REQ/RULE 归属、范围、输入输出、文件/符号、依赖 DAG、权限/兼容、异常边界、local 测试命令/样本/断言、失败预期、清理、回滚、责任人和证据；保证唯一归属、无环依赖、实现-测试-审查-验收独立闭环，P0/P1 未决即 blocked，并更新同一份 doc/2-需求/ 主文档。"
