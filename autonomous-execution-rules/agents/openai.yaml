interface:
  display_name: "自主连续执行规则"
  short_description: "Auto-continue tasks and pause only at key decision points"
  default_prompt: "使用 $autonomous-execution-rules 自动推进多步骤任务：确认计划和执行许可后，每次任务状态迁移先调用 $task-plan-rehydration-rules 原子更新 PROJECT_CURRENT，再真实调用 update_plan；UI 恢复不改变执行许可，进行中步骤先核验中断点。只有原计划内必需动作才能自动继续，不得把可选优化升级为新任务。开工指令缺少正式计划、完成定义、停止条件和最大推进边界时不得实现。每个最小任务独立完成实现、真实测试、审查和验收；关键、高风险、Git 未授权、真实 blocked/manual_handoff 或用户结束时暂停并按既有收口契约处理。任务完成后先把投影置为 inactive，再按运行时机制真实结束状态；无合法后续时直接结束。"
