interface:
  display_name: "自主连续执行规则"
  short_description: "Auto-continue tasks and pause only at key decision points"
  default_prompt: "使用 $autonomous-execution-rules 自动推进多步骤任务：当任务尚未闭环且准备输出“下一步建议/是否继续”时，只有在该下一步属于原执行计划内未完成必需项、且仍属于完成原始用户目标所必需的动作时，才默认直接执行，不停顿询问；不得把“进一步优化/可继续整理/后续再做一轮”自动升级为新任务。用户说“开始实施/开始实现/开始执行/直接做/继续做完/按文档实现”等开工类指令时，不得视为无边界长文本执行授权；必须已有执行计划，或先输出包含执行范围、完成定义、停止条件、最大推进边界和验证点的本轮受限计划，缺少计划或停止条件时不得直接实现。当计划与停止边界齐备且用户已明确开始时，默认连续推进到实现与测试闭环，仅在阻断级或高风险节点暂停。任何 agent 收到用户明确结束指令（如“结束/停止/到此为止/不要继续/不要下一步建议/不要扩散”）时，必须立即停止自动继续和扩散性输出，只保留必要的最小收口结论。最终收口只允许三类合法后续：原执行计划内未完成必需项、阻断项、用户显式要求的建议/backlog；除此之外必须强制无下一步并直接结束，不输出“下一步状态/下一步建议/等待用户新指令/无需继续动作”等可能触发循环 loop 的占位文案。如果当前运行环境存在 goal/plan/task 等显式状态收口机制，收口前必须按对应机制真实结束状态，Codex goal 仅是其中一种特例。若刚发生上下文压缩且编码许可状态不是 confirmed（如 unknown/revoked），必须先暂停确认，不得直接进入编码。"
