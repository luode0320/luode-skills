interface:
  display_name: "需求变更"
  short_description: "识别语义变更、失效传播和重规划信号。"
  default_prompt: "使用 $requirement-change-rules；为每次变更生成唯一 CHG-*，记录来源、旧值/新值、授权、状态和受影响的需求、验收、计划、测试、审查与交付结论。信息缺失转 requirement-intake-rules#gap-routing，原实现错误转 Bug 域；P0/P1 未授权即 blocked。只声明失效与回开 Owner，实施总览、周期、文件/符号和测试命令交 implementation-planning-rules 重新冻结。"
