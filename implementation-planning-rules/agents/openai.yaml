interface:
  display_name: "实施规划"
  short_description: "把已确认来源对象转成编码前可执行、可验证、可交接的实施总览与实施周期"
  default_prompt: "使用 $implementation-planning-rules 将已确认来源对象（需求或 Bug）或当前优先子项拆成极致完整、零决策可执行的实施方案；若新项目或多来源对象存在多份需求/实施文档，先生成或更新“需求与实施计划全量顺序实施方案”，再进入单来源对象实施总览和实施周期。行为变更默认必须有总览和至少一个周期；每个最小任务都要明确文件/符号操作、禁止触碰区、精确 local 测试命令、断言、清理、回滚、完成/停止条件和最大推进边界，并按实现→真实测试→审查→验收逐个闭环。实施总览、周期和任务卡必须使用对应模板与图形化标准，新增文件用目录树，数据库变更附 SQL；用户采纳建议时也必须先落正式计划，不能直接编码。"
