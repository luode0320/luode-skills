interface:
  display_name: "实施规划"
  short_description: "把已确认来源对象转成编码前可执行、可验证、可交接的实施总览与实施周期"
  default_prompt: "使用 $implementation-planning-rules 将已确认来源对象（需求或 Bug）或当前优先子项拆成编码前可执行的实施方案；若新项目或多来源对象存在多份需求/实施文档，先生成或更新“需求与实施计划全量顺序实施方案”，再进入单来源对象实施总览。单来源对象先生成或更新实施总览；当任务较大时再拆实施周期，明确文件落点、任务顺序、验证点；若涉及新增文件必须使用目录树代码块记录，若涉及数据库新表/字段变更必须附 SQL。若用户当前轮是在采纳上一轮建议、方案、修复路线或实施思路，也必须先把建议转成正式实施计划，不能直接开始编码。"
