interface:
  display_name: "Skill 合规闸门"
  short_description: "在最终回复前检查已命中 skill 的执行完整性并给出可执行下一步建议"
  default_prompt: "使用 $skill-compliance-gate-rules 在最终回复前执行闸门检查：1) 逐项核对本轮已命中的 skill 是否存在“可执行但未执行”的规则缺口；2) 若有代码改动，强制检查 `comment-placement-granularity-rules` 与 `comment-completion-gate-rules` 的注释双 skill 闸门（必要性/位置/字段注释/过期注释治理、步骤流程至少顶层 `1` 就近注释且多步骤补齐 `1/2/3`、复杂步骤可含 `1.1/1.2` 细分、`[参数]` / `[返回]`、最近修改时间、最近修改时间后的改动原因、方法注释顺序为“参数/返回在前，最近修改时间最后一行”）；3) 若方法体存在步骤流程却无顶层 `1` 编号，直接判定未通过；4) 即使用户只要求补充注释，也不得跳过方法体步骤注释核验；5) 合并输出 1-3 条下一步建议，主任务建议优先、skill 补齐建议次优先。"
