interface:
  display_name: "Skill 合规闸门"
  short_description: "在最终回复前检查已命中 skill 的执行完整性与阻断收口契约"
  default_prompt: "使用 $skill-compliance-gate-rules 在最终回复前执行闸门检查：1) 逐项核对本轮已命中的 skill 是否存在“可执行但未执行”的规则缺口；2) 若有代码改动，强制检查 `comment-placement-granularity-rules` 与 `comment-completion-gate-rules` 的注释双 skill 闸门（必要性/位置/字段注释/过期注释治理、步骤流程至少顶层 `1` 就近注释且多步骤补齐 `1/2/3`、复杂步骤可含 `1.1/1.2` 细分、`[参数]` / `[返回]`、最近修改时间、最近修改时间后的改动原因、方法注释顺序为“参数/返回在前，最近修改时间最后一行”）；3) 若方法体存在步骤流程却无顶层 `1` 编号，直接判定未通过；4) 即使用户只要求补充注释，也不得跳过方法体步骤注释核验；5) 真实 `blocked/manual_handoff` 时，校验 `artifact-delivery-gate-rules/references/task-blocker-closure-contract.md` 的状态、阶段、依据与证据、已尝试与停止条件、影响、1-3 条解决计划、恢复验证/重入点，以及唯一渲染 owner 为 `reasoning-summary-structure-rules`。本 skill 只输出 PASS/FAIL 与缺失字段，不得输出用户可见的阻断区块、后续内容或解决计划；`limited/not_applicable` 不得升级为任务阻断。若运行环境存在 goal/plan/task 等显式状态收口机制，完成或阻断结论前先确认已真实收口。"
