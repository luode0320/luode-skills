interface:
  display_name: "Skill 合规闸门"
  short_description: "在最终回复前检查已命中 skill 的执行完整性并判定合法后续内容"
  default_prompt: "使用 $skill-compliance-gate-rules 在最终回复前执行闸门检查：1) 逐项核对本轮已命中的 skill 是否存在“可执行但未执行”的规则缺口；2) 若有代码改动，强制检查 `comment-placement-granularity-rules` 与 `comment-completion-gate-rules` 的注释双 skill 闸门（必要性/位置/字段注释/过期注释治理、步骤流程至少顶层 `1` 就近注释且多步骤补齐 `1/2/3`、复杂步骤可含 `1.1/1.2` 细分、`[参数]` / `[返回]`、最近修改时间、最近修改时间后的改动原因、方法注释顺序为“参数/返回在前，最近修改时间最后一行”）；3) 若方法体存在步骤流程却无顶层 `1` 编号，直接判定未通过；4) 即使用户只要求补充注释，也不得跳过方法体步骤注释核验；5) 最终收口只允许三类合法后续：原执行计划内未完成必需项、阻断项、用户显式要求的建议/backlog。若不存在这三类合法后续，则强制无下一步并直接结束，不输出“下一步状态/下一步建议/无需继续动作/等待用户新指令”等可能触发循环 loop 的占位文案；可选优化、额外整理、未来迭代、体验提升、文档再润色等内容，若不属于原计划必需项，不得作为默认后续内容输出。若运行环境存在 goal/plan/task 等显式状态收口机制，完成结论前先确认已真实收口。"
