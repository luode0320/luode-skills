interface:
  display_name: "总结结构闸门"
  short_description: "在最终推理总结时强制检查输出结构完整性与条件字段"
  default_prompt: "使用 $reasoning-summary-structure-rules 在最终回复前执行总结结构闸门检查。按固定顺序输出：Skill 命中检查、Skill 执行证据、当前问题（用户原始需求、模型理解的需求、两者是否一致）、解决方案与根因、结果与结论、条件字段（改动点/验证结果/函数注释核对）。默认不输出“下一步状态/下一步建议”区块；仅当存在原执行计划内未完成必需项、阻断项，或用户明确要求后续建议/backlog 时，才允许追加后续内容。若不存在这三类合法后续，强制无下一步并直接收口，不输出“下一步状态/下一步建议/无需继续动作/等待用户新指令”等可能触发循环 loop 的占位文案。若运行环境存在 goal/plan/task 等显式状态收口机制，完成结论前先确认已真实收口。若必填项缺失，先补信息再收口。"
