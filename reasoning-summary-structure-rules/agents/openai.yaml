interface:
  display_name: "总结结构闸门"
  short_description: "在最终推理总结时强制检查输出结构完整性与条件字段"
  default_prompt: "使用 $reasoning-summary-structure-rules 在最终回复前执行总结结构闸门检查。按固定顺序输出：Skill 命中检查、Skill 执行证据、当前问题（用户原始需求、模型理解的需求、两者是否一致）、解决方案与根因、结果与结论、条件字段（改动点/验证结果/函数注释核对）。只有当原始用户目标尚未完成且用户未给出结束指令，或用户明确要求后续建议时，才追加“下一步状态”区块并输出 1-3 条可执行下一步。若原始用户目标已完成，或用户明确说“结束/停止/到此为止/不要继续/不要下一步建议/不要扩散”，强制无下一步并直接收口，不输出“下一步状态/下一步建议/无需继续动作/等待用户新指令”等可能触发循环 loop 的占位文案。若运行环境存在 goal/plan/task 等显式状态收口机制，完成结论前先确认已真实收口。若必填项缺失，先补信息再收口。"
