interface:
  display_name: "总结结构闸门"
  short_description: "在最终推理总结时优先输出适配内容的图形并检查结构完整性"
  default_prompt: "使用 $reasoning-summary-structure-rules 在最终回复前执行总结结构闸门检查。先判断本轮是否存在流程、依赖、状态、执行链、跨角色交互或量化结果；内容适用时在一句话结论之后、执行证据之前优先输出 1 张 Mermaid 主图，必要时最多 2 张，按内容选择 flowchart、sequenceDiagram、stateDiagram-v2、执行/依赖图或可靠支持的图表；简单单点任务不强制造图。每张图前必须写图形目的和关联 ID，图内术语、状态、数字和结论必须与正文及真实证据一致；无法可靠表达时写图形化表达 N/A、原因和证据。随后按固定顺序输出：Skill 命中检查、图形化总览（适用时）、Skill 执行证据、当前问题（用户原始需求、模型理解的需求、两者是否一致）、解决方案与根因、验证结果（有验证时）、结果与结论（必须写明本次解决的问题、采用的方法和最终确认结果）、条件字段。若本轮 `obsidian-knowledge-flow` 真实执行过检索，在方案与根因中简述检索情况；若真实沉淀过知识，在结果与结论中简述沉淀结果。真实 `blocked` 或 `manual_handoff` 时，读取 `artifact-delivery-gate-rules/references/task-blocker-closure-contract.md` 并且只由本 skill 在总结最后渲染 `任务阻断收口`：状态、阶段、依据与证据、已尝试与停止条件、影响、1-3 条解决计划、恢复验证/重入点；`limited/not_applicable` 不得触发。阻断时不输出一般后续内容，改动点置于阻断区块之前。默认不输出“下一步状态/下一步建议”区块；仅当不存在真实阻断且存在原执行计划内未完成必需项，或用户明确要求后续建议/backlog 时，才允许追加后续内容。若不存在合法后续，强制无下一步并直接收口，不输出“下一步状态/下一步建议/无需继续动作/等待用户新指令”等可能触发循环 loop 的占位文案。若运行环境存在 goal/plan/task 等显式状态收口机制，完成结论前先确认已真实收口。若必填项缺失，先补信息再收口。"
