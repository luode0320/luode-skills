interface:
  display_name: "需求边界判定"
  short_description: "判定需求边界，并更新同一份 doc/2-需求/ 主文档。"
  default_prompt: "使用 $requirement-boundary-rules 以唯一 BOUND-* 冻结 In Scope/Out of Scope、允许/禁止修改层、上下游、权限、兼容、数据影响、责任人、证据、回滚和 AC 回指；每个功能点只能归属需求/排除项/独立变更/Bug/历史问题之一，边界变化同步正文、矩阵、Mermaid 图、拆分、验收和实施周期，关键未决即 blocked，并更新同一份 doc/2-需求/ 主文档。"
