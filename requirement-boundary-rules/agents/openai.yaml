interface:
  display_name: "需求边界判定"
  short_description: "专项判定范围、归属、兼容与上下游影响。"
  default_prompt: "使用 $requirement-boundary-rules；按 boundary-checklist 生成唯一 BOUND-*，冻结 In Scope/Out of Scope、允许/禁止修改层、上下游、权限、兼容、数据影响、证据和回滚。信息缺失转 requirement-intake-rules#gap-routing，历史缺陷转 Bug 域；边界未收敛即 blocked，结论回写同一份需求主文档。"
