interface:
  display_name: "并行与子代理统一分发"
  short_description: "统一判定串行/并行，真实启动并回收子代理"
  default_prompt: "使用 $parallel-task-dispatch-rules 在任一 skill 命中并进入实质执行前只运行一次统一状态机：判断串行、条件并行或可并行，评估上下文重复读取与启动成本，冻结主/子职责和互斥写集，遵守系统工具元数据、当前轮授权、项目级完全授权与用户禁止信号，真实启动、观测、回收并关闭子代理；主线程继续非重叠关键工作，最终对齐计划线程数、实际启动数、完成数、关闭数和回退原因。"
