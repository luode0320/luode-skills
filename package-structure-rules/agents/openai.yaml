interface:
  display_name: "包结构与分层"
  short_description: "判断 main.go、internal、根级入口层与业务分层目录的落点和依赖方向"
  default_prompt: "使用 $package-structure-rules 判断当前代码应落在 `main.go`、`internal`、根级 `global/middleware/crontask`，还是 `router`、`controller`、`service`、`repository`、`model`、`entity` 等目录，并说明允许的依赖方向；Go 场景下请求/响应/第三方结果结构体优先归位到 `internal/entity/<domain>/`，避免散落在 `internal/service` 实现文件。"
