interface:
  display_name: "新会话预热"
  short_description: "新会话缺上下文时预热，或按恢复契约条件补近期事实"
  default_prompt: "使用 $recent-context-bootstrap-rules 在新会话缺少项目近期事实时扫描近 3 天来源；若由 $context-compression-rules 调用，必须先确认 recent_context_state=missing，并只补共享 context-recovery-contract 记录的缺失项。当前上下文充分、状态 uncertain 或用户已停止时不得触发；完成后输出来源、补齐项、仍缺项并立即交还主域。"
