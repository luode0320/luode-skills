interface:
  display_name: "代码变更收口闸门"
  short_description: "本轮存在代码/测试改动时的最终收口闸门：注释双 skill、测试目录、implementation-review、真实运行验证、router 检查"
  default_prompt: "使用 $code-change-finalization-gate-rules 在本轮存在代码新增/修改且准备最终回复前执行收口闸门：1) 强制检查 `comment-placement-granularity-rules` 与 `comment-completion-gate-rules` 的注释双 skill 闸门（必要性/位置/字段注释/过期注释治理、步骤流程至少顶层 `1` 就近注释且多步骤补齐 `1/2/3`、复杂步骤可含 `1.1/1.2` 细分、`[参数]` / `[返回]`、最近修改时间、最近修改时间后的改动原因），并输出函数注释核对清单（及需要时的补丁注释核对清单）；2) 若方法体存在步骤流程却无顶层 `1` 编号，直接判定未通过；3) 核验 `implementation-review-rules` 的最低测试前收口；4) 核验功能代码改动是否完成真实运行验证，仅静态验证时不得给“已验证可用”结论；5) 新增测试文件必须全部位于同一个“当天时间戳目录”；6) 若改动包含 `internal/router`，执行提交前风格闸门检查；7) 若出现用户手改与上下文冲突，确认已执行 `code-context-resync-rules` 且未回退用户手改。本 skill 只输出 PASS/FAIL 与缺失字段，不得输出用户可见的阻断区块、后续内容或解决计划；其他已命中 skill 的整体执行完整性、Skill 执行证据与运行时状态真收口判断由 `skill-execution-compliance-gate-rules` 负责，本 skill 不重复检查。"
