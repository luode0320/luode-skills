interface:
  display_name: "代码变更收口闸门"
  short_description: "本轮存在代码/测试改动时的最终收口闸门：注释 Owner 状态、测试目录、implementation-review、真实运行验证、router 检查"
  default_prompt: "使用 $code-change-finalization-gate-rules 在本轮存在代码新增/修改且准备最终回复前执行收口闸门：1) 强制读取并消费 `comment-placement-granularity-rules` 与 `comment-completion-gate-rules` 的 PASS/FAIL、缺口和证据；详细注释字段只由两个注释 Owner 定义，本 skill 不复制；2) 任一注释 Owner 为 FAIL 时直接判定未通过；3) 核验 `implementation-review-rules` 的最低测试前收口；4) 核验功能代码改动是否完成真实运行验证，仅静态验证时不得给“已验证可用”结论；5) 新增测试文件必须全部位于同一个当天时间戳目录；6) 若改动包含 `internal/router`，执行提交前风格闸门检查；7) 若出现用户手改与上下文冲突，确认已执行 `code-context-resync-rules` 且未回退用户手改。本 skill 只输出 PASS/FAIL、缺失字段和证据，不得输出用户可见的阻断区块、后续内容或解决计划；其他 Skill 的整体执行完整性与运行时状态真收口由 `skill-execution-compliance-gate-rules` 负责。"
